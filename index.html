<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoloLog</title>
    <style>
        body {
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h1 { color: #333; }
        p { color: #666; }
        img { max-width: 100%; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello VoloLog</h1>
        <p>这里是你的骑行记录。</p>
        <!-- 注意：这里的 src 名字必须和你照片的名字一模一样 -->
        <img src="photo.jpg" alt="Cycling Photo">
    </div>
</body>
</html>
